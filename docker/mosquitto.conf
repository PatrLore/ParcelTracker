# Minimal Mosquitto config for local/self-hosted use with the optional
# `mosquitto` service in docker-compose.yml (profile "mqtt").
#
# Anonymous access is fine when the broker is only reachable on your own
# Docker network / LAN. If you expose port 1883 beyond that, configure a
# password file and TLS instead - see:
# https://mosquitto.org/documentation/authentication-methods/

listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
