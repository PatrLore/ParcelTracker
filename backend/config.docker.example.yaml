# Parcel Server configuration for the Docker Compose stack.
# Copy to backend/config.yaml before running `docker compose up`.
# Unlike config.example.yaml (SQLite, for bare-metal/local development), this
# variant points at the Postgres container started by docker-compose.yml.

app:
  name: "Parcel Server"
  environment: "production"
  debug: false
  timezone: "Europe/Berlin"

server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"

database:
  driver: "postgresql"
  host: "db"
  port: 5432
  name: "parcel_server"
  user: "parcel_server"
  password: "change-me"

security:
  jwt_secret_key: "change-me-generate-a-long-random-value"
  jwt_algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 14
  password_hash_scheme: "argon2"
  # Generate with:
  # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  mail_encryption_key: "change-me-generate-a-fernet-key"

rate_limit:
  enabled: true
  default: "100/minute"

logging:
  level: "INFO"
  directory: "/app/backend/logs"
  file_name: "parcel-server.log"
  max_bytes: 10485760
  backup_count: 5

redis:
  enabled: false
  host: "redis"
  port: 6379
  db: 0

tracking_provider:
  # none | seventeentrack | aftership | trackingmore | ship24
  name: "none"
  api_key: ""
  poll_interval_seconds: 900

# Each notification channel is independently enabled - all off by default.
notification:
  webhook:
    enabled: false
    url: ""
  discord:
    enabled: false
    webhook_url: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  signal:
    enabled: false
    base_url: ""
    sender_number: ""
    recipient_number: ""
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    username: ""
    password: ""
    from_address: ""
    to_address: ""
    use_tls: true

mqtt:
  enabled: false
  host: "mosquitto"
  port: 1883
  username: ""
  password: ""
  publish_interval_seconds: 60

# "Sign in with Microsoft" for Outlook.com/Hotmail/Live mailboxes - see
# docs/mailboxes.md for the Azure/Entra ID app registration steps.
microsoft_oauth:
  enabled: false
  client_id: ""
  tenant: "consumers"
