# Parcel Server configuration.
# Copy this file to config.yaml and adjust the values for your environment.
# Every runtime setting is controlled from here - nothing is hardcoded.

app:
  name: "Parcel Server"
  environment: "development" # development | production
  debug: true
  timezone: "Europe/Berlin"

server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"

database:
  # Supported drivers: sqlite, postgresql, mariadb
  driver: "sqlite"
  sqlite_path: "./data/parcel-server.db"
  host: "localhost"
  port: 5432
  name: "parcel_server"
  user: "parcel_server"
  password: ""

security:
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(64))"
  jwt_secret_key: "change-me-in-production"
  jwt_algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 14
  password_hash_scheme: "argon2"
  # Generate with:
  # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  mail_encryption_key: "wwNjK7vVV7DOZFW6aYDQF2AJea9AIUFZKHSHY5QE7Lg="

rate_limit:
  enabled: true
  default: "100/minute"

logging:
  level: "INFO" # DEBUG | INFO | WARNING | ERROR
  directory: "./logs"
  file_name: "parcel-server.log"
  max_bytes: 10485760
  backup_count: 5

redis:
  enabled: false
  host: "localhost"
  port: 6379
  db: 0

tracking_provider:
  # none | seventeentrack | aftership | trackingmore | ship24
  name: "none"
  api_key: ""
  poll_interval_seconds: 900

# Each notification channel is independently enabled - all off by default.
notification:
  webhook:
    enabled: false
    url: ""
  discord:
    enabled: false
    webhook_url: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  signal:
    # Requires a self-hosted signal-cli-rest-api sidecar; see
    # https://github.com/bbernhard/signal-cli-rest-api
    enabled: false
    base_url: ""
    sender_number: ""
    recipient_number: ""
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    username: ""
    password: ""
    from_address: ""
    to_address: ""
    use_tls: true

mqtt:
  enabled: false
  host: "localhost"
  port: 1883
  username: ""
  password: ""
  publish_interval_seconds: 60

# "Sign in with Microsoft" for Outlook.com/Hotmail/Live mailboxes, whose
# plain-password IMAP login Microsoft has retired - see docs/mailboxes.md
# for the Azure/Entra ID app registration steps this needs.
microsoft_oauth:
  enabled: false
  client_id: ""
  # "consumers" = personal Microsoft accounts only (Hotmail/Outlook/Live).
  tenant: "consumers"
