name: Release Home Assistant integration

# custom_components/parcel_server lives at the repository root (HACS
# requires it there - see hacs.json, which uses HACS's normal install
# method, not zip_release), so this workflow is NOT required for HACS
# installs. It's a convenience for people who want a versioned zip to
# install manually without HACS: packages custom_components/parcel_server
# into parcel_server.zip and attaches it to a GitHub Release.
#
# Cut a release either by pushing a tag matching ha-v*:
#   git tag ha-v0.1.0 && git push origin ha-v0.1.0
# or by running this workflow manually (Actions tab -> Release Home
# Assistant integration -> Run workflow) with the desired tag name - the
# release step creates that tag automatically if it doesn't exist yet.

on:
  push:
    tags:
      - "ha-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release, e.g. ha-v0.1.0"
        required: true
        default: "ha-v0.1.0"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Zip the integration
        working-directory: custom_components/parcel_server
        run: zip -r "$GITHUB_WORKSPACE/parcel_server.zip" . -x "__pycache__/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: "Home Assistant integration ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          files: parcel_server.zip
          body: |
            Parcel Server Home Assistant integration, manual/non-HACS install.
            See integrations/home_assistant/README.md - HACS users don't need this.
