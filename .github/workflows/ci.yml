name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: |
          pip install -e "tracking[dev]" -e "importer[dev]" \
            -e "notification[dev]" -e "mqtt[dev]" -e "backend[dev]"
      - run: ruff check app tests
        working-directory: backend
      - run: ruff format --check app tests
        working-directory: backend
      - run: ruff check .
        working-directory: importer
      - run: ruff check .
        working-directory: tracking
      - run: ruff check .
        working-directory: notification
      - run: ruff check .
        working-directory: mqtt
      - run: pytest --cov=app --cov-report=term-missing
        working-directory: backend
      - run: pytest
        working-directory: importer
      - run: pytest
        working-directory: tracking
      - run: pytest
        working-directory: notification
      - run: pytest
        working-directory: mqtt

  home-assistant-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_test.txt ruff
        working-directory: integrations/home_assistant
      # custom_components/ lives at the repo root - HACS requires it there -
      # while the integration's dev tooling (tests, pyproject.toml) stays
      # under integrations/home_assistant/, so lint/test each in place.
      - run: ruff check custom_components
      - run: ruff format --check custom_components
      - run: ruff check integrations/home_assistant/tests
      - run: ruff format --check integrations/home_assistant/tests
      - run: pytest
        working-directory: integrations/home_assistant

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
